# conf/agent/draco_v4.yaml
# DRACO v4 -- single self-contained agent. Select with `defaults: - agent: draco_v4`.
# Defaults below reproduce the validated C1 run (Gap_Recovered crossed 0): structured
# head, no comm, stationary DR curriculum covering the held-out lambdas, grounded d_hat.
algorithm: draco_v4

# ===================== BAMDP belief (recurrent) =====================
encoder_type: gru
z_dim: 8
kl_coef: 1.0e-3            # ELBO KL-to-prior weight
pred_coef: 1.0            # ELBO demand-reconstruction weight ([FIX 3]: target is RAW demand)
belief_sample: false
use_context: true
# belief_mode (ABLATION #8): encoder (default, the learned BAMDP belief) | ewma | bayes -> the
# structured head's d_hat comes from a closed-form plug-in rate estimate and the encoder is bypassed
# and not trained. Isolates whether the learned encoder beats a simple rate estimator.
belief_mode: encoder
plugin_prior_mean: 8.0     # plug-in (ewma/bayes) prior mean demand rate
plugin_prior_strength: 1.0 # bayes plug-in: prior strength in pseudo-periods
plugin_eta: 0.2            # ewma plug-in: smoothing factor

# ===================== actor head =====================
# structured = interpretable base-stock head S = softplus(lead*d_hat + safety + corr).
# mlp = free-S negative control (Study-4 / H3). Live selector is `actor_head`.
actor_head: structured
lead_init: 4.0
demand_init: 8.0
corr_scale: 6.0
demand_aux_coef: 0.3      # raised from 0.05: at 0.05 the d_hat range compressed and S
                          # would not fan across lambda; 0.3 grounds the demand readout
                          # enough for the head to track the regime (the C1 fix).
s_smooth_coef: 0.0
s_bias_init: 40.0
s_logstd_init: 0.7

# ===================== communication (DIAL) =====================
use_comm: false
comm_topology: neighbor   # NEW (Study 2): neighbor | skip | full  (see agents/topologies.py).
                          # Only used when use_comm=true. neighbor == the original chain ADJ.
msg_dim: 1
msg_penalty_coef: 0.0
entropy_coef: 0.01
msg_mode: dhat

# ===================== critic =====================
critic_uses_belief: true
# critic_mode (ABLATION #19): centralized (default, CTDE global-state critic) | independent (IPPO:
# per-agent critic on local obs only, no global state).
critic_mode: centralized
n_quantiles: 32           # [v4-INERT] critic is scalar in v4 (value-normalized); kept for
                          # checkpoint/back-compat only -- not read by the live trainer.

# --- v4 architecture flags ---
structured_head: true     # [v4-INERT/legacy] the LIVE head selector is `actor_head` above.
order_cap_coef: 0.0       # safety valve off
corr_l2_coef: 0.0         # safety valve off (raise to ~1e-3 if S won't come DOWN at low lambda)

# ===================== risk OFF by default =====================
risk_eta: 0.0
cvar_alpha: 0.2

# ===================== SRDQN per-agent reward shaping =====================
# Each agent's shaped reward is -(own_cost + srdqn_beta * others_cost). This is a CREDIT-ASSIGNMENT
# choice, and it interacts with the reported objective:
#   beta = 1.0  -> reward = -(total team cost) for every agent = EXACTLY the evaluation objective
#                  (team-optimal; the objective-exact setting -- report this in the ablation).
#   beta < 1.0  -> down-weights others' cost: lower-variance learning signal, but it does NOT
#                  optimize the reported team cost. 0.5 is the default heuristic.
# Run the beta ablation (phase_beta_sweep.sh) over {0.0, 0.5, 1.0} and report the sensitivity.
srdqn_beta: 0.5
reward_scale: 50.0        # [v4-INERT] v4 uses running value-normalization instead of a fixed
                          # reward_scale; kept for back-compat only -- not read by the trainer.

# ===================== PPO / optimisation =====================
gamma: 0.99
gae_lambda: 0.95
k_epochs: 4
critic_epochs: 8
eps_clip: 0.2
max_grad_norm: 0.5
lr_actor: 3.0e-4
lr_msg: 3.0e-4
lr_critic: 1.0e-3
lr_encoder: 1.0e-3        # raised so the belief encodes demand fast (supports [FIX 3])
polyak_tau: 0.005         # [v4-INERT] no Polyak target net in v4; kept for back-compat only.
hidden_dim: 128

# ===================== training schedule =====================
batch_episodes: 8
warm_up_episodes: 0
patience: 3000
lr_scheduler_step: 2000
lr_scheduler_gamma: 0.5
trace_every: 0
heldout_lambdas: [6, 10, 14, 18, 22]   # held-out eval regimes; Phase 1/2 override to the VAL set on the CLI

# ===================== demand-randomisation curriculum = p(T) =====================
# C1-validated: covers the held-out lambdas {6,10,14,18,22} so the held-out eval tests
# regime INFERENCE, not extrapolation. dr_p_shift=0 = stationary (matches the stationary
# held-out test). For a robustness/non-stationary variant (Study 2 secondary), set
# dr_p_shift=0.4 on the CLI.
dr_lambda_lo: 4.0
dr_lambda_hi: 24.0
dr_p_shift: 0.0
dr_shift_scale: 2.5

# ===================== distributional-robustness DR (M2; OFF by default) =====================
# dr_mode=poisson (default) randomizes only the Poisson RATE (rate-robustness within one family).
# dr_mode=family randomizes the demand FAMILY per episode -> Poisson rate + NegBin overdispersion
# + AR(1) autocorrelation (distributional robustness). Train on a SUBSET (dr_families) and hold a
# family OUT for the held-out-family test: `python agents/eval_draco_v4.py --ckpt ... --families`.
# Sources: NegBin retail demand = Agrawal & Smith (1996); AR(1) demand/bullwhip = Lee et al. (1997),
# Lee, So & Tang (2000); Poisson = classical (Hadley & Whitin 1963). No env edit -- demand_families.py
# subclasses the env (demand_type stays 'poisson', a 'family' key routes the sampler).
dr_mode: poisson
dr_families: [poisson, negbin]   # training families; ar1 held out for the distributional-shift test
nb_mu_lo: 4.0
nb_mu_hi: 24.0
nb_dispersion_lo: 2.0            # NegBin dispersion r: var = mu + mu^2/r  (smaller r = burstier demand)
nb_dispersion_hi: 12.0
ar1_mu_lo: 4.0
ar1_mu_hi: 24.0
ar1_rho_lo: 0.0
ar1_rho_hi: 0.8                  # AR(1) lag-1 autocorrelation (the Lee-et-al info-sharing regime)
ar1_sigma: 3.0

# ===================== in-training evaluation =====================
eval_every: 50
eval_episodes: 5
ood_eval_type: black_swan

# ===================== held-out-lambda eval (C1 gate) =====================
# Scores DRACO on stationary unknown regimes vs the fixed-policy BAR / per-lambda CEILING
# from `python scripts/baselines.py regime`. Watch Eval_lambda/Gap_Recovered.
heldout_every: 200        # eval cadence (episodes). 100 for denser pilots, 400 for the sweep.
heldout_episodes: 8       # episodes per lambda. 8 = fast/readable pilot; 20 = clean sweep number.
heldout_fixed_ref: 4726.0 # BAR     (best single fixed base-stock) -- regenerate via baselines.py
heldout_oracle_ref: 2202.0 # CEILING (per-lambda oracle)           -- regenerate via baselines.py